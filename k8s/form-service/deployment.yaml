apiVersion: apps/v1
kind: Deployment
metadata:
  name: form-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: form-service
  template:
    metadata:
      labels:
        app: form-service
    spec:
      containers:
        - name: form-service
          image: localhost:5000/circleguard-form:latest
          ports:
            - containerPort: 8086
          envFrom:
            - configMapRef:
                name: circleguard-config
          env:
            - name: SPRING_DATASOURCE_URL
              value: "jdbc:postgresql://$(POSTGRES_HOST):$(POSTGRES_PORT)/circleguard_form"
            - name: SPRING_DATASOURCE_USERNAME
              value: "admin"
            - name: SPRING_DATASOURCE_PASSWORD
              value: "password"
            - name: SPRING_KAFKA_BOOTSTRAP_SERVERS
              value: "$(KAFKA_BOOTSTRAP)"
          readinessProbe:
            tcpSocket:
              port: 8086
            initialDelaySeconds: 30
            periodSeconds: 10
