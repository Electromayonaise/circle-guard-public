apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-redis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-redis
  template:
    metadata:
      labels:
        app: circleguard-redis
    spec:
      containers:
        - name: redis
          image: redis:7.2
          ports:
            - containerPort: 6379
          readinessProbe:
            exec:
              command: [redis-cli, ping]
            initialDelaySeconds: 5
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-redis
spec:
  selector:
    app: circleguard-redis
  ports:
    - port: 6379
      targetPort: 6379
