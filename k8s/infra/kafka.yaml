apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-server-config
data:
  server.properties: |
    node.id=1
    process.roles=broker,controller
    listeners=PLAINTEXT://:9092,CONTROLLER://:9093
    advertised.listeners=PLAINTEXT://circleguard-kafka:9092
    controller.listener.names=CONTROLLER
    listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
    controller.quorum.voters=1@localhost:9093
    log.dirs=/kafka-data
    offsets.topic.replication.factor=1
    transaction.state.log.replication.factor=1
    transaction.state.log.min.isr=1
    auto.create.topics.enable=true
    num.partitions=1
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: circleguard-kafka
spec:
  replicas: 1
  selector:
    matchLabels:
      app: circleguard-kafka
  template:
    metadata:
      labels:
        app: circleguard-kafka
    spec:
      initContainers:
        - name: kafka-init
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              cp /kafka-config/server.properties /tmp/server.properties
              /opt/kafka/bin/kafka-storage.sh format \
                -t MkU3OEVBNTcwNTJENDM2Qk \
                -c /tmp/server.properties
          volumeMounts:
            - name: kafka-config
              mountPath: /kafka-config
            - name: kafka-data
              mountPath: /kafka-data
      containers:
        - name: kafka
          image: apache/kafka:3.7.0
          command:
            - /bin/sh
            - -c
            - |
              cp /kafka-config/server.properties /tmp/server.properties
              exec /opt/kafka/bin/kafka-server-start.sh /tmp/server.properties
          ports:
            - containerPort: 9092
            - containerPort: 9093
          readinessProbe:
            tcpSocket:
              port: 9092
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
          volumeMounts:
            - name: kafka-config
              mountPath: /kafka-config
            - name: kafka-data
              mountPath: /kafka-data
      volumes:
        - name: kafka-config
          configMap:
            name: kafka-server-config
        - name: kafka-data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: circleguard-kafka
spec:
  selector:
    app: circleguard-kafka
  ports:
    - name: broker
      port: 9092
      targetPort: 9092
    - name: controller
      port: 9093
      targetPort: 9093
