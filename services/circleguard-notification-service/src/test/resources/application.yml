spring:
  kafka:
    bootstrap-servers: ${spring.embedded.kafka.brokers:localhost:9092}
    consumer:
      auto-offset-reset: earliest
  mail:
    host: localhost
    port: 25
    properties:
      mail:
        smtp:
          auth: false
          starttls:
            enable: false
management:
  health:
    mail:
      enabled: false

auth:
  api:
    url: http://localhost:9999
jwt:
  secret: "my-super-secret-dev-key-32-chars-long-12345678"
  expiration: 3600000
qr:
  secret: "my-qr-secret-key-for-dev-1234567890"
  expiration: 300
